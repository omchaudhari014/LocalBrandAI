<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LocalBrandAI - AI Marketing Assistant</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen',
                'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue',
                sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        function App() {
            const [businessType, setBusinessType] = useState("");
            const [offer, setOffer] = useState("");
            const [language, setLanguage] = useState("Hindi");
            const [result, setResult] = useState("");

            const handleGenerate = () => {
                // Temporary demo response
                setResult(
                    `Special ${offer} at our ${businessType}! Visit today! (Language: ${language})`
                );
            };

            return (
                <div style={styles.container}>
                    <h1 style={styles.title}>🚀 LocalBrandAI</h1>
                    <p style={styles.subtitle}>AI Marketing Assistant for Small Businesses</p>

                    <input
                        type="text"
                        placeholder="Business Type (e.g. Bakery)"
                        value={businessType}
                        onChange={(e) => setBusinessType(e.target.value)}
                        style={styles.input}
                    />

                    <input
                        type="text"
                        placeholder="Offer Details (e.g. 20% Discount)"
                        value={offer}
                        onChange={(e) => setOffer(e.target.value)}
                        style={styles.input}
                    />

                    <select
                        value={language}
                        onChange={(e) => setLanguage(e.target.value)}
                        style={styles.input}
                    >
                        <option>Hindi</option>
                        <option>Marathi</option>
                        <option>Gujarati</option>
                        <option>Tamil</option>
                    </select>

                    <button onClick={handleGenerate} style={styles.button}>
                        Generate Content
                    </button>

                    {result && (
                        <div style={styles.result}>
                            <h3 style={styles.resultTitle}>Generated Caption:</h3>
                            <p style={styles.resultText}>{result}</p>
                        </div>
                    )}
                </div>
            );
        }

        const styles = {
            container: {
                maxWidth: "500px",
                margin: "20px",
                padding: "40px",
                textAlign: "center",
                fontFamily: "Arial, sans-serif",
                backgroundColor: "white",
                borderRadius: "20px",
                boxShadow: "0 20px 60px rgba(0,0,0,0.3)",
            },
            title: {
                fontSize: "2.5em",
                margin: "0 0 10px 0",
                color: "#333",
            },
            subtitle: {
                color: "#666",
                marginBottom: "30px",
                fontSize: "1.1em",
            },
            input: {
                width: "100%",
                padding: "15px",
                margin: "10px 0",
                border: "2px solid #e0e0e0",
                borderRadius: "10px",
                fontSize: "16px",
                boxSizing: "border-box",
                transition: "border-color 0.3s",
            },
            button: {
                width: "100%",
                padding: "15px 20px",
                marginTop: "20px",
                backgroundColor: "#667eea",
                color: "white",
                border: "none",
                borderRadius: "10px",
                cursor: "pointer",
                fontSize: "18px",
                fontWeight: "bold",
                transition: "background-color 0.3s",
            },
            result: {
                marginTop: "30px",
                padding: "20px",
                backgroundColor: "#f8f9fa",
                borderRadius: "10px",
                border: "2px solid #667eea",
            },
            resultTitle: {
                margin: "0 0 10px 0",
                color: "#667eea",
            },
            resultText: {
                margin: 0,
                fontSize: "16px",
                color: "#333",
                lineHeight: "1.6",
            },
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
