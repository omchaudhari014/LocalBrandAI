<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LocalBrandAI - With Database</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        .card {
            background: white;
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        .tab {
            padding: 10px 20px;
            border: none;
            background: #f0f0f0;
            border-radius: 10px;
            cursor: pointer;
            font-size: 16px;
        }
        .tab.active {
            background: #667eea;
            color: white;
        }
        .history-item {
            border: 1px solid #e0e0e0;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 10px;
        }
        .stat-card {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
        }
        .stat-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function App() {
            const [activeTab, setActiveTab] = useState('generate');
            const [businessType, setBusinessType] = useState("");
            const [offer, setOffer] = useState("");
            const [language, setLanguage] = useState("Hindi");
            const [result, setResult] = useState("");
            const [loading, setLoading] = useState(false);
            const [error, setError] = useState("");
            const [history, setHistory] = useState([]);
            const [stats, setStats] = useState(null);

            const API_URL = 'http://localhost:5000';

            // Fetch history
            const fetchHistory = async () => {
                try {
                    const response = await fetch(`${API_URL}/content?limit=20`);
                    const data = await response.json();
                    if (data.success) {
                        setHistory(data.data);
                    }
                } catch (err) {
                    console.error('Error fetching history:', err);
                }
            };

            // Fetch stats
            const fetchStats = async () => {
                try {
                    const response = await fetch(`${API_URL}/stats`);
                    const data = await response.json();
                    if (data.success) {
                        setStats(data.stats);
                    }
                } catch (err) {
                    console.error('Error fetching stats:', err);
                }
            };

            useEffect(() => {
                if (activeTab === 'history') {
                    fetchHistory();
                } else if (activeTab === 'stats') {
                    fetchStats();
                }
            }, [activeTab]);

            const handleGenerate = async () => {
                if (!businessType || !offer) {
                    setError("Please fill in all fields!");
                    return;
                }

                setLoading(true);
                setError("");
                setResult("");

                try {
                    const response = await fetch(`${API_URL}/generate`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ businessType, offer, language })
                    });

                    if (!response.ok) throw new Error('Failed to generate');

                    const data = await response.json();
                    setResult(data.message);
                    
                    if (data.saved) {
                        alert('✅ Content saved to database!');
                    }
                } catch (err) {
                    setError('Failed to connect. Make sure backend is running on port 5000.');
                } finally {
                    setLoading(false);
                }
            };

            const deleteContent = async (id) => {
                if (!confirm('Delete this content?')) return;
                
                try {
                    await fetch(`${API_URL}/content/${id}`, { method: 'DELETE' });
                    fetchHistory();
                } catch (err) {
                    alert('Failed to delete');
                }
            };

            return (
                <div className="container">
                    <div className="card">
                        <h1 style={{margin: 0, color: '#333'}}>🚀 LocalBrandAI</h1>
                        <p style={{color: '#666'}}>AI Marketing Assistant with Database</p>
                    </div>

                    <div className="tabs">
                        <button 
                            className={`tab ${activeTab === 'generate' ? 'active' : ''}`}
                            onClick={() => setActiveTab('generate')}
                        >
                            ✨ Generate
                        </button>
                        <button 
                            className={`tab ${activeTab === 'history' ? 'active' : ''}`}
                            onClick={() => setActiveTab('history')}
                        >
                            📜 History
                        </button>
                        <button 
                            className={`tab ${activeTab === 'stats' ? 'active' : ''}`}
                            onClick={() => setActiveTab('stats')}
                        >
                            📊 Statistics
                        </button>
                    </div>

                    {activeTab === 'generate' && (
                        <div className="card">
                            <input
                                type="text"
                                placeholder="Business Type (e.g. Bakery)"
                                value={businessType}
                                onChange={(e) => setBusinessType(e.target.value)}
                                style={{width: '100%', padding: '15px', margin: '10px 0', border: '2px solid #e0e0e0', borderRadius: '10px', fontSize: '16px', boxSizing: 'border-box'}}
                            />
                            <input
                                type="text"
                                placeholder="Offer Details (e.g. 20% Discount)"
                                value={offer}
                                onChange={(e) => setOffer(e.target.value)}
                                style={{width: '100%', padding: '15px', margin: '10px 0', border: '2px solid #e0e0e0', borderRadius: '10px', fontSize: '16px', boxSizing: 'border-box'}}
                            />
                            <select
                                value={language}
                                onChange={(e) => setLanguage(e.target.value)}
                                style={{width: '100%', padding: '15px', margin: '10px 0', border: '2px solid #e0e0e0', borderRadius: '10px', fontSize: '16px'}}
                            >
                                <option>Hindi</option>
                                <option>Marathi</option>
                                <option>Gujarati</option>
                                <option>Tamil</option>
                            </select>
                            <button 
                                onClick={handleGenerate}
                                disabled={loading}
                                style={{width: '100%', padding: '15px', marginTop: '20px', background: '#667eea', color: 'white', border: 'none', borderRadius: '10px', fontSize: '18px', fontWeight: 'bold', cursor: loading ? 'not-allowed' : 'pointer', opacity: loading ? 0.6 : 1}}
                            >
                                {loading ? 'Generating...' : 'Generate Content'}
                            </button>

                            {error && (
                                <div style={{marginTop: '20px', padding: '20px', background: '#fee', borderRadius: '10px', border: '2px solid #fcc'}}>
                                    <p style={{margin: 0, color: '#c00'}}>⚠️ {error}</p>
                                </div>
                            )}

                            {result && (
                                <div style={{marginTop: '30px', padding: '20px', background: '#f8f9fa', borderRadius: '10px', border: '2px solid #667eea'}}>
                                    <h3 style={{margin: '0 0 10px 0', color: '#667eea'}}>✨ Generated Caption:</h3>
                                    <p style={{margin: '0 0 15px 0', fontSize: '16px', lineHeight: '1.6'}}>{result}</p>
                                    <button 
                                        onClick={() => navigator.clipboard.writeText(result)}
                                        style={{padding: '10px 20px', background: '#28a745', color: 'white', border: 'none', borderRadius: '8px', cursor: 'pointer'}}
                                    >
                                        📋 Copy
                                    </button>
                                </div>
                            )}
                        </div>
                    )}

                    {activeTab === 'history' && (
                        <div className="card">
                            <h2>📜 Content History</h2>
                            {history.length === 0 ? (
                                <p>No content generated yet. Start creating!</p>
                            ) : (
                                history.map(item => (
                                    <div key={item._id} className="history-item">
                                        <div style={{display: 'flex', justifyContent: 'space-between', alignItems: 'start'}}>
                                            <div style={{flex: 1}}>
                                                <strong>{item.businessType}</strong> - {item.offer}
                                                <br/>
                                                <span style={{color: '#666', fontSize: '14px'}}>
                                                    {item.language} • {new Date(item.createdAt).toLocaleString()}
                                                </span>
                                                <p style={{margin: '10px 0'}}>{item.generatedContent}</p>
                                            </div>
                                            <button 
                                                onClick={() => deleteContent(item._id)}
                                                style={{padding: '5px 10px', background: '#dc3545', color: 'white', border: 'none', borderRadius: '5px', cursor: 'pointer'}}
                                            >
                                                🗑️
                                            </button>
                                        </div>
                                    </div>
                                ))
                            )}
                        </div>
                    )}

                    {activeTab === 'stats' && (
                        <div className="card">
                            <h2>📊 Statistics</h2>
                            {stats ? (
                                <>
                                    <div className="stat-card">
                                        <h1 style={{margin: 0, color: '#667eea'}}>{stats.total}</h1>
                                        <p style={{margin: '5px 0 0 0'}}>Total Content Generated</p>
                                    </div>
                                    
                                    <div className="stat-grid">
                                        <div className="stat-card">
                                            <h3>By Language</h3>
                                            {stats.byLanguage.map(item => (
                                                <div key={item._id}>
                                                    {item._id}: {item.count}
                                                </div>
                                            ))}
                                        </div>
                                        
                                        <div className="stat-card">
                                            <h3>Top Business Types</h3>
                                            {stats.topBusinessTypes.map(item => (
                                                <div key={item._id}>
                                                    {item._id}: {item.count}
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                </>
                            ) : (
                                <p>Loading statistics...</p>
                            )}
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
